defaults:
  - env/maniskill_put_on_plate_in_scene_25_main@env.train
  - env/maniskill_put_on_plate_in_scene_25_main@env.eval
  - model/pi0@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: all  # No actor needed for preference collection

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_collect_preference_openpi"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: True
  val_check_interval: 10  # disable training eval
  save_interval: 50

  resume_dir: null
  ckpt_path: null  # Optional: path to a .pt checkpoint of the policy to collect from

# Preference data collection settings
preference:
  # Number of rollout epochs to execute; each epoch gives one episode per env
  num_collection_epochs: 1
  # Where to write the resulting PreferencePair list (pickle)
  output_path: "/workspace/RLinf/data/preference_data/maniskill_preference.pkl"
  # Minimum reward difference between chosen and rejected for a pair to be kept
  min_reward_diff: 0.01

algorithm:
  normalize_advantages: True
  kl_penalty: kl
  group_size: 1
  reward_coef: 1.0

  rollout_epoch: 2
  eval_rollout_epoch: 2  # must be > 0 for validate_cfg with only_eval=True
  reward_type: chunk_level
  logprob_type: token_level
  entropy_type: chunk_level
  update_epoch: 4

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"

  bootstrap_type: always
  kl_beta: 0.0
  entropy_bonus: 0.005
  clip_ratio_high: 0.2
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  filter_rewards: False
  rewards_lower_bound: 0.0
  rewards_upper_bound: 1.0

  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 50
    top_p: 1.0
    repetition_penalty: 1.0
    add_BOS: False

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  train:
    total_num_envs: 64  # smaller than training for collection
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    init_params:
      use_multiple_plates: False
  eval:
    total_num_envs: 320  # each epoch collects 320 episodes (one per env)
    auto_reset: False  # one episode per env per epoch — simplifies pairing
    ignore_terminations: True
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    use_fixed_reset_state_ids: True  # vary initial states for diverse data
    group_size: ${algorithm.group_size}
    is_eval: True
    video_cfg:
      save_video: True
      per_env_video: True
      info_on_video: False
      fps: 5
      video_base_dir: ${runner.logger.log_path}/video/preference
    init_params:
      use_multiple_plates: False

rollout:
  group_name: "RolloutGroup"
  generation_backend: "huggingface"
  recompute_logprobs: False
  unnorm_key: libero_10
  enable_offload: False
  pipeline_stage_num: 1

  model:
    model_path: "/workspace/RLinf/RLinf-Pi0-ManiSkill-25Main-SFT"
    precision: ${actor.model.precision}

# actor section kept for config references used by env/rollout workers
actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 5120
  seed: 0
  enable_offload: False
  model:
    model_path: "/workspace/RLinf/RLinf-Pi0-ManiSkill-25Main-SFT"
    model_name: "openpi"
    precision: null
    num_action_chunks: 5
    action_dim: 7
    add_value_head: True
    openpi:
      config_name: "pi0_maniskill"
      num_images_in_input: 1
      noise_method: "flow_noise"
      action_horizon: 8
      noise_params: [0.16, 0.12, 200]
      detach_critic_input: True
      joint_logprob: True
      value_after_vlm: False
    policy_setup: widowx_bridge

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
