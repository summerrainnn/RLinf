defaults:
  - env/maniskill_put_on_plate_in_scene_25_main@env.train
  - env/maniskill_ood_template@env.eval
  - model/openvla_oft@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    env,rollout: 2-7

runner:
  task_type: embodied
  logger:
    log_path: "../results"
    project_name: rlinf
    experiment_name: "maniskill_collect_trajectory_data_openvla"
    logger_backends: ["tensorboard"]

  max_epochs: 1000
  max_steps: -1
  only_eval: True
  val_check_interval: 10
  save_interval: 50
  resume_dir: null
  ckpt_path: null

# Multi-policy trajectory collection settings
# Uses the same base_seed as the openpi config for consistent task distribution.
# Run in openvla-oft venv: source switch_env openvla-oft
collection:
  num_tasks: 1
  base_seed: 420
  trajectories_per_task: 2500
  num_segments: 1
  max_steps: 80
  output_path: "/workspace/RLinf/data/trajectory_data/maniskill_trajectories_openvla.json"

  policies:
    - name: "expert_ppo_openvla"
      type: "checkpoint"
      model_type: "openvla_oft"
      model_path: "/workspace/RLinf/RLinf-OpenVLAOFT-PPO-ManiSkill3-25ood"
      weight: 1.0
      temperature: 1.0

algorithm:
  normalize_advantages: True
  kl_penalty: kl  # how to estimate kl divergence: kl or kl_penalty
  group_size: 1
  rollout_epoch: 1
  eval_rollout_epoch: 1 # set eval_rollout_epoch > 0 when enable runner.only_eval or runner.val_check_interval > 0
  reward_type: action_level
  logprob_type: token_level
  entropy_type: token_level

  adv_type: gae
  loss_type: actor_critic
  loss_agg_func: "token-mean"
  
  bootstrap_type: always # [standard, always]. Bootstrap Q-values according to terminations and truncations. "standard" only bootstraps when truncations, while "always" bootstraps when truncations or terminations.
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0


  gamma: 0.99
  gae_lambda: 0.95

  # params for rollout
  sampling_params:
    do_sample: True
    temperature_train: 1.0
    temperature_eval: 0.6
    top_k: 0
    top_p: 1.0
    repetition_penalty: 1.0

  # length argument for autoregressive sampling
  # max length means max amount of tokens to generate
  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

env:
  group_name: "EnvGroup"

  # Override the default values in env/maniskill_put_on_plate_in_scene_25_main and env/maniskill_ood_template
  train:
    total_num_envs: 240
    auto_reset: True
    use_fixed_reset_state_ids: False
    max_episode_steps: 80 # max episode steps for truncation
    max_steps_per_rollout_epoch: 160
  eval:
    total_num_envs: 240
    auto_reset: True
    ignore_terminations: True
    max_episode_steps: 80
    max_steps_per_rollout_epoch: 80
    use_fixed_reset_state_ids: True
    group_size: 1
    video_cfg:
      save_video: True
      per_env_video: True
      info_on_video: False
      fps: 5
      video_base_dir: ${runner.logger.log_path}/video/trajectory

rollout:
  group_name: "RolloutGroup"
  backend: "huggingface"
  enable_offload: True
  pipeline_stage_num: 1

  model:
    model_path: "/workspace/RLinf/RLinf-OpenVLAOFT-PPO-ManiSkill3-25ood"
    precision: ${actor.model.precision}

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 5120
  seed: 0
  enable_offload: False
  model:
    model_path: "/workspace/RLinf/RLinf-OpenVLAOFT-PPO-ManiSkill3-25ood"
    model_type: "openvla_oft"

    is_lora: False
    unnorm_key: bridge_orig
    policy_setup: "widowx_bridge"
    add_value_head: False
    max_prompt_length: 30

  optim:
    lr: 7.91e-6
    value_lr: 1.55e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-08
    clip_grad: 1.0
    critic_warmup_steps: 0

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
